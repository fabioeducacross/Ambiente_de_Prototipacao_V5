<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <title>Educacross Protótipos</title>
    <script>
        // SPA redirect trick para GitHub Pages (spa-github-pages)
        // Quando o GitHub Pages retorna 404 para rotas Vue Router,
        // este script redireciona para index.html codificando a rota na query string.
        // pathSegmentsToKeep = 1 → mantém /Ambiente_de_Prototipacao_V5/
        var pathSegmentsToKeep = 1
        var l = window.location
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        )
    </script>
</head>

<body></body>

</html>
