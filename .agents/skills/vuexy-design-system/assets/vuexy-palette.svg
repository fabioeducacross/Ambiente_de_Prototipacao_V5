<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" style="font-family: Montserrat, sans-serif;">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="gradPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7367F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9E95F5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradSuccess" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#28C76F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#48E68B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradWarning" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9F43;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFBC69;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradInfo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00CFE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#26E3F5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="900" fill="#F8F9FA"/>
  
  <!-- Título -->
  <text x="600" y="40" text-anchor="middle" font-size="32" font-weight="700" fill="#2F2B3D">
    Vuexy Color Palette - Educacross
  </text>
  
  <text x="600" y="70" text-anchor="middle" font-size="14" fill="rgba(47,43,61,0.6)">
    Design System | 6 cores principais + variantes
  </text>
  
  <!-- Primary -->
  <g filter="url(#shadow)">
    <rect x="20" y="100" width="180" height="80" rx="8" fill="#7367F0"/>
    <text x="110" y="135" text-anchor="middle" font-size="16" font-weight="600" fill="white">Primary</text>
    <text x="110" y="155" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)">#7367F0</text>
    <text x="110" y="170" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">rgb(115, 103, 240)</text>
    <rect x="20" y="185" width="88" height="30" rx="4" fill="#6258d4"/>
    <rect x="112" y="185" width="88" height="30" rx="4" fill="#9E95F5"/>
    <text x="64" y="205" text-anchor="middle" font-size="9" fill="white">Hover</text>
    <text x="156" y="205" text-anchor="middle" font-size="9" fill="white">Light</text>
    <text x="110" y="230" text-anchor="middle" font-size="9" fill="rgba(47,43,61,0.7)">Ações principais, links, missões</text>
  </g>
  
  <!-- Success -->
  <g filter="url(#shadow)">
    <rect x="220" y="100" width="180" height="80" rx="8" fill="#28C76F"/>
    <text x="310" y="135" text-anchor="middle" font-size="16" font-weight="600" fill="white">Success</text>
    <text x="310" y="155" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)">#28C76F</text>
    <text x="310" y="170" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">rgb(40, 199, 111)</text>
    <rect x="220" y="185" width="88" height="30" rx="4" fill="#24b263"/>
    <rect x="312" y="185" width="88" height="30" rx="4" fill="#48E68B"/>
    <text x="264" y="205" text-anchor="middle" font-size="9" fill="white">Hover</text>
    <text x="356" y="205" text-anchor="middle" font-size="9" fill="white">Light</text>
    <text x="310" y="230" text-anchor="middle" font-size="9" fill="rgba(47,43,61,0.7)">Sucesso, confirmações, iniciante</text>
  </g>
  
  <!-- Warning -->
  <g filter="url(#shadow)">
    <rect x="420" y="100" width="180" height="80" rx="8" fill="#FF9F43"/>
    <text x="510" y="135" text-anchor="middle" font-size="16" font-weight="600" fill="white">Warning</text>
    <text x="510" y="155" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)">#FF9F43</text>
    <text x="510" y="170" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">rgb(255, 159, 67)</text>
    <rect x="420" y="185" width="88" height="30" rx="4" fill="#e68a2e"/>
    <rect x="512" y="185" width="88" height="30" rx="4" fill="#FFBC69"/>
    <text x="464" y="205" text-anchor="middle" font-size="9" fill="white">Hover</text>
    <text x="556" y="205" text-anchor="middle" font-size="9" fill="white">Light</text>
    <text x="510" y="230" text-anchor="middle" font-size="9" fill="rgba(47,43,61,0.7)">Avisos, intermediário, avaliações</text>
  </g>
  
  <!-- Danger -->
  <g filter="url(#shadow)">
    <rect x="620" y="100" width="180" height="80" rx="8" fill="#EA5455"/>
    <text x="710" y="135" text-anchor="middle" font-size="16" font-weight="600" fill="white">Danger</text>
    <text x="710" y="155" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)">#EA5455</text>
    <text x="710" y="170" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">rgb(234, 84, 85)</text>
    <rect x="620" y="185" width="88" height="30" rx="4" fill="#d33b3c"/>
    <rect x="712" y="185" width="88" height="30" rx="4" fill="#F07071"/>
    <text x="664" y="205" text-anchor="middle" font-size="9" fill="white">Hover</text>
    <text x="756" y="205" text-anchor="middle" font-size="9" fill="white">Light</text>
    <text x="710" y="230" text-anchor="middle" font-size="9" fill="rgba(47,43,61,0.7)">Erros, exclusões, avançado</text>
  </g>
  
  <!-- Info -->
  <g filter="url(#shadow)">
    <rect x="820" y="100" width="180" height="80" rx="8" fill="#00CFE8"/>
    <text x="910" y="135" text-anchor="middle" font-size="16" font-weight="600" fill="white">Info</text>
    <text x="910" y="155" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)">#00CFE8</text>
    <text x="910" y="170" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">rgb(0, 207, 232)</text>
    <rect x="820" y="185" width="88" height="30" rx="4" fill="#00b8cf"/>
    <rect x="912" y="185" width="88" height="30" rx="4" fill="#26E3F5"/>
    <text x="864" y="205" text-anchor="middle" font-size="9" fill="white">Hover</text>
    <text x="956" y="205" text-anchor="middle" font-size="9" fill="white">Light</text>
    <text x="910" y="230" text-anchor="middle" font-size="9" fill="rgba(47,43,61,0.7)">Informações, olimpíadas</text>
  </g>
  
  <!-- Secondary -->
  <g filter="url(#shadow)">
    <rect x="1020" y="100" width="160" height="80" rx="8" fill="#82868B"/>
    <text x="1100" y="135" text-anchor="middle" font-size="16" font-weight="600" fill="white">Secondary</text>
    <text x="1100" y="155" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)">#82868B</text>
    <text x="1100" y="170" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">rgb(130, 134, 139)</text>
    <rect x="1020" y="185" width="78" height="30" rx="4" fill="#6e7175"/>
    <rect x="1102" y="185" width="78" height="30" rx="4" fill="#9EA1A5"/>
    <text x="1059" y="205" text-anchor="middle" font-size="9" fill="white">Hover</text>
    <text x="1141" y="205" text-anchor="middle" font-size="9" fill="white">Light</text>
    <text x="1100" y="230" text-anchor="middle" font-size="9" fill="rgba(47,43,61,0.7)">Secundários, desabilitados</text>
  </g>
  
  <!-- Neutrals Section -->
  <text x="20" y="320" font-size="20" font-weight="600" fill="#2F2B3D">
    Neutrals &amp; Text Colors
  </text>
  
  <!-- Text Primary -->
  <g filter="url(#shadow)">
    <rect x="20" y="340" width="180" height="100" rx="8" fill="#FFFFFF" stroke="rgba(47,43,61,0.2)" stroke-width="1"/>
    <text x="110" y="375" text-anchor="middle" font-size="14" font-weight="600" fill="#2F2B3D">Text Primary</text>
    <text x="110" y="395" text-anchor="middle" font-size="11" fill="#2F2B3D" opacity="0.8">rgba(47, 43, 61, 0.9)</text>
    <text x="110" y="420" text-anchor="middle" font-size="9" fill="#2F2B3D" opacity="0.7">Títulos, textos principais</text>
  </g>
  
  <!-- Text Secondary -->
  <g filter="url(#shadow)">
    <rect x="220" y="340" width="180" height="100" rx="8" fill="#FFFFFF" stroke="rgba(47,43,61,0.2)" stroke-width="1"/>
    <text x="310" y="375" text-anchor="middle" font-size="14" font-weight="600" fill="rgba(47,43,61,0.6)">Text Secondary</text>
    <text x="310" y="395" text-anchor="middle" font-size="11" fill="rgba(47,43,61,0.6)" opacity="0.8">rgba(47, 43, 61, 0.6)</text>
    <text x="310" y="420" text-anchor="middle" font-size="9" fill="rgba(47,43,61,0.6)" opacity="0.7">Subtítulos, metadata</text>
  </g>
  
  <!-- Text Disabled -->
  <g filter="url(#shadow)">
    <rect x="420" y="340" width="180" height="100" rx="8" fill="#FFFFFF" stroke="rgba(47,43,61,0.2)" stroke-width="1"/>
    <text x="510" y="375" text-anchor="middle" font-size="14" font-weight="600" fill="rgba(47,43,61,0.4)">Text Disabled</text>
    <text x="510" y="395" text-anchor="middle" font-size="11" fill="rgba(47,43,61,0.4)" opacity="0.8">rgba(47, 43, 61, 0.4)</text>
    <text x="510" y="420" text-anchor="middle" font-size="9" fill="rgba(47,43,61,0.4)" opacity="0.7">Elementos desabilitados</text>
  </g>
  
  <!-- Background Light -->
  <g filter="url(#shadow)">
    <rect x="620" y="340" width="180" height="100" rx="8" fill="#F8F9FA" stroke="rgba(47,43,61,0.2)" stroke-width="1"/>
    <text x="710" y="375" text-anchor="middle" font-size="14" font-weight="600" fill="#2F2B3D">Background Light</text>
    <text x="710" y="395" text-anchor="middle" font-size="11" fill="#2F2B3D" opacity="0.8">#F8F9FA</text>
    <text x="710" y="420" text-anchor="middle" font-size="9" fill="#2F2B3D" opacity="0.7">Background da página</text>
  </g>
  
  <!-- Gradients Section -->
  <text x="20" y="500" font-size="20" font-weight="600" fill="#2F2B3D">
    Gradients
  </text>
  
  <g filter="url(#shadow)">
    <rect x="20" y="520" width="270" height="60" rx="8" fill="url(#gradPrimary)"/>
    <text x="155" y="555" text-anchor="middle" font-size="14" font-weight="600" fill="white">
      Primary Gradient
    </text>
  </g>
  
  <g filter="url(#shadow)">
    <rect x="310" y="520" width="270" height="60" rx="8" fill="url(#gradSuccess)"/>
    <text x="445" y="555" text-anchor="middle" font-size="14" font-weight="600" fill="white">
      Success Gradient
    </text>
  </g>
  
  <g filter="url(#shadow)">
    <rect x="600" y="520" width="270" height="60" rx="8" fill="url(#gradWarning)"/>
    <text x="735" y="555" text-anchor="middle" font-size="14" font-weight="600" fill="white">
      Warning Gradient
    </text>
  </g>
  
  <g filter="url(#shadow)">
    <rect x="890" y="520" width="290" height="60" rx="8" fill="url(#gradInfo)"/>
    <text x="1035" y="555" text-anchor="middle" font-size="14" font-weight="600" fill="white">
      Info Gradient
    </text>
  </g>
  
  <!-- Activity Colors Section -->
  <text x="20" y="640" font-size="20" font-weight="600" fill="#2F2B3D">
    Activity Types
  </text>
  
  <g filter="url(#shadow)">
    <rect x="20" y="660" width="360" height="80" rx="8" fill="rgba(115, 103, 240, 0.12)"/>
    <circle cx="60" cy="700" r="12" fill="#7367F0"/>
    <text x="85" y="705" font-size="16" font-weight="600" fill="#7367F0">Missão</text>
    <text x="200" y="705" font-size="12" fill="rgba(47,43,61,0.6)">Primary (#7367F0)</text>
  </g>
  
  <g filter="url(#shadow)">
    <rect x="400" y="660" width="380" height="80" rx="8" fill="rgba(0, 207, 232, 0.12)"/>
    <circle cx="440" cy="700" r="12" fill="#00CFE8"/>
    <text x="465" y="705" font-size="16" font-weight="600" fill="#00CFE8">Olimpíada</text>
    <text x="600" y="705" font-size="12" fill="rgba(47,43,61,0.6)">Info (#00CFE8)</text>
  </g>
  
  <g filter="url(#shadow)">
    <rect x="800" y="660" width="380" height="80" rx="8" fill="rgba(255, 159, 67, 0.12)"/>
    <circle cx="840" cy="700" r="12" fill="#FF9F43"/>
    <text x="865" y="705" font-size="16" font-weight="600" fill="#FF9F43">Avaliação</text>
    <text x="1000" y="705" font-size="12" fill="rgba(47,43,61,0.6)">Warning (#FF9F43)</text>
  </g>
  
  <!-- Footer -->
  <text x="600" y="880" text-anchor="middle" font-size="11" fill="rgba(47,43,61,0.5)">
    Gerado em 12/02/2026 | Educacross Design System v1.0.0
  </text>
  
</svg>
