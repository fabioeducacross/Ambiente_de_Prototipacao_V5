name: Deploy Vite to GitHub Pages

on:
  push:
    branches: ["v1.1", "v1.3-Calendario", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 'FrontOffice/package-lock.json'

      - name: Install dependencies
        working-directory: ./FrontOffice
        run: npm ci

      - name: Build FrontOffice
        working-directory: ./FrontOffice
        run: npm run build

      - name: Setup Node (Docusaurus)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 'documentation/package-lock.json'

      - name: Install Docusaurus dependencies
        working-directory: ./documentation
        run: npm ci

      - name: Build Docusaurus wiki
        working-directory: ./documentation
        run: npm run build

      - name: Copy wiki into FrontOffice dist
        run: cp -r documentation/build FrontOffice/dist/wiki

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: FrontOffice/dist

  deploy:
    needs: build
    # Só faz deploy no GitHub Pages a partir do branch main
    # (proteção de ambiente do GitHub Pages não permite outros branches)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
